<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .kirmizi{  
            background-color: red;
            height: 100px;
        }

        .mavi{  
            background-color: blue  ;
            height: 100px;
        }

        .yesil{  
            background-color: green;
            height: 100px;
        }

        .mor{  
            background-color: purple;
            height: 100px;
        }
    </style>
  </head>
  <body>



<h1 class="display-3 text-center">Grid Örnek</h1>


<div class="container-fluid">
    <div class="row my-2">
        <div class="col"><div class="kirmizi"></div></div>
        <div class="col"><div class="kirmizi"></div></div>
        <div class="col"><div class="kirmizi"></div></div>
        <div class="col"><div class="kirmizi"></div></div>
    </div>

    <div class="row my-2">
        <div class="col-6"><div class="yesil"></div></div>
        <div class="col-2"><div class="mavi"></div></div>
        <div class="col-1"><div class="mavi"></div></div>
        <div class="col-3"><div class="kirmizi"></div></div>
    </div>

    <div class="row my-2">
        <div class="offset-3 col-5"><div class="mor"></div></div>
    </div>
</div>

<hr>
<h1 class="display-3 text-center">Responsive Grid Örnek</h1>


<div class="container-fluid">
    <div class="row my-2 g-2">
        <div class="col-sm-12 col-md-6 col-lg-3"><div class="yesil"></div></div>
        <div class="col-sm-12 col-md-6 col-lg-3"><div class="yesil"></div></div>

        <div class="col-sm-12 col-md-6 col-lg-3"><div class="yesil"></div></div>
    </div>

    <div class="row my-2 g-2">
        <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 col-xxl-1"><div class="mavi"></div></div>
        <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 col-xxl-1"><div class="mavi"></div></div>
        <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 col-xxl-1"><div class="mavi"></div></div>
        <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 col-xxl-1"><div class="mavi"></div></div>
        <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 col-xxl-1"><div class="mavi"></div></div>

        <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 col-xxl-1"><div class="mavi"></div></div>
        <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 col-xxl-1"><div class="mavi"></div></div>
        <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 col-xxl-1"><div class="mavi"></div></div>
        <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 col-xxl-1"><div class="mavi"></div></div>
        <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 col-xxl-1"><div class="mavi"></div></div>
    </div>
</div>
