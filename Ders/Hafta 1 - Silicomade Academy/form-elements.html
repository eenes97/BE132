<!DOCTYPE html>
<html>
<head>
    <title>Form Elemanları</title>
</head>
<body>

    <!-- form etiketinin 2 temel attribute'u vardır -->
    <!-- action: formun gönderilmesi için kullanılacak URL/backend -->
    <!-- method: formun gönderilmesi için kullanılacak HTTP methodu (GET, POST) -->
    <form action="" method="get">
        <!-- type: backend'e giden verinin tipi -->
        <!-- name: backend'e giden verinin adı -->
        <label for="i1">İsim:</label>
        <input id="i1" type="text" name="isim" />
        <br />
        <br />
        <label for="i2">Yaş:</label>
        <input id="i2" type="number" name="yas" />
        <br />
        <br />
        <input type="submit" value="Kaydet" />
        
    </form>
    
</body>
</html>
